version: "3.9"

services:
  # ── PostgreSQL 主数据库 ──
  postgres:
    image: postgres:16-alpine
    container_name: newsflow-postgres
    environment:
      POSTGRES_USER: newsflow
      POSTGRES_PASSWORD: newsflow
      POSTGRES_DB: newsflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 缓存/消息队列 ──
  redis:
    image: redis:7-alpine
    container_name: newsflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO 文件存储（S3 兼容） ──
  minio:
    image: minio/minio:latest
    container_name: newsflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── Elasticsearch 全文检索/审计日志 ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: newsflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  redisdata:
  miniodata:
  esdata:
